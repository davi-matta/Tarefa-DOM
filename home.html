<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/modal_adição.css">
    <link rel="stylesheet" href="/css/modal_editar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <title>Lista de compras</title>
</head>
<body>
    <header>
            <h1>Lista de Compras</h1>
            
            <p><span>0</span> itens</p>
    </header>


    <main>
        <section class="secao_menu">
            <div id="estado_vazio">
            
                <img src="/assets/carrinho.svg" alt="Ícone carrinho de compras">
            
                <h2>Nenhum item na lista ainda</h2>

                <p>Toque em "+ adicionar item" para começar</p>
            </div>

            <ul id="lista_principal" ></ul>

            <div class="acoes">
                <button class="add_itens">+ adicionar itens</button>

                <button class="edit_itens"><img src="/assets/lapis-edição.png" alt="Lápis de edição">Editar lista</button>
            </div>
        </section>

    </main>

    <dialog id="modal_adicionar">
        <div class="modal_header">
            <h2>Adicionar item</h2>
            <button class="botao_fechar">X</button>
        </div>

        <form>
            <div class="area_input">
                <div id="area_item">
                    <label for="nome_item">NOME DO ITEM</label>
                    <input type="text" id="nome_item" placeholder="Ex: Leite integral">
                </div>

                <div id="area_qtd">
                    <label for="qtd_item">QUANTIDADE (OPCIONAL)</label>
                    <input type="text" id="qtd_item"  placeholder="Ex: 2 unidades, 500g...">
                </div>
            </div>

            <div class="modal_acoes">
                <button type="button" class="botao_cancelar">Cancelar</button>
                <button type="button" class="botao_adicionar">Adicionar</button>

            </div>
        </form>

    </dialog>

    <dialog id="modal_editar">
        <div class="modal_header_editar">
            <h2>Editar lista</h2>
            <button class="botao_fechar_editar">X</button>
        </div>

        <ul class="lista_edicao"></ul> 

        <div class="modal_rodape">
            <button type="button" class="botao_concluir">Concluir</button>
        </div>

    </dialog>



    <script src="/DOM.js"></script>

</body>
</html>
