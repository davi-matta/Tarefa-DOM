<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <title>Lista de compras</title>
</head>
<body>
    <header>
            <h1>Lista de Compras</h1>
            
            <p><span>0</span> itens</p>
    </header>


    <main>
        <section>
                <img src="/assets/carrinho.svg" alt="Ícone carrinho de compras">
            
                <h2>Nenhum item na lista ainda</h2>

                <p>Toque em "+ adicionar item" para começar</p>

            <div class="Acoes">
                <button class="add-itens">+ adicionar itens</button>

                <button class="edit-itens"><img src="/assets/lapis-edição.png" alt="Lápis de edição">Editar lista</button>
            </div>
        </section>

    </main>
</body>
</html>
